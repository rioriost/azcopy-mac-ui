name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift test --enable-code-coverage
      - run: Scripts/check-coverage.sh
      - run: Scripts/security-review.sh

  release:
    needs: verify
    runs-on: macos-15
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "$RUNNER_TEMP/keychain-pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP/keychain-pass" build.keychain
          echo "$DEVELOPER_ID_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security import "$RUNNER_TEMP/developer-id.p12" -k build.keychain -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP/keychain-pass" build.keychain
      - name: Package, notarize, and staple
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: Scripts/package-release.sh
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.sha256

