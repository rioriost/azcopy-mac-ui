name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Test with coverage
        run: swift test --enable-code-coverage
      - name: Coverage gate
        run: Scripts/check-coverage.sh
      - name: Build app
        run: xcodebuild -project AzCopyMacUI.xcodeproj -scheme AzCopyMacUI -destination 'platform=macOS,arch=arm64' build

